---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gatus
  namespace: observability
  annotations:
    hajimari.io/enable: "true"
    hajimari.io/icon: mdi:list-status
    hajimari.io/group: Monitoring
    hajimari.io/appName: Kansatsu
spec:
  hostnames:
    - "kansatsu.${SECRET_DOMAIN_2}"
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: gatus
          port: 8080