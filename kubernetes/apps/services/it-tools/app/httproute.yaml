---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: it-tools
  namespace: services
  annotations:
    hajimari.io/enable: "true"
    hajimari.io/icon: mdi:hammer-wrench
    hajimari.io/group: services
    hajimari.io/appName: IT-Tools
    hajimari.io/description: "A collection of tools for IT professionals. Encryption and decryption of files, QR code generation, and more."

spec:
  hostnames:
    - "it-tools.${SECRET_DOMAIN}"
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: it-tools
          port: 8080
