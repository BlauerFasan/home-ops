---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sparkyfitness-server

spec:
  chartRef:
    kind: OCIRepository
    name: sparkyfitness
  interval: 1h

  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3

  values:
    controllers:
      sparkyfitness-server:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"

        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3.0@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
              pullPolicy: IfNotPresent
            envFrom:
              - secretRef:
                  name: sparkyfitness-init-db

        containers:
          app:
            image:
              # renovate: datasource=docker depName=ghcr.io/codewithcj/sparkyfitness-server
              repository: ghcr.io/codewithcj/sparkyfitness-server
              tag: v0.16.6.0@sha256:fda636e5adce8da495fe649df4aa230f37c47edbd134798163ac8461479ca725

            env:
              TZ: ${CLUSTER_TIMEZONE}
              SPARKY_FITNESS_LOG_LEVEL: debug

              SPARKY_FITNESS_FRONTEND_URL: "https://kenkou.${SECRET_DOMAIN}"

              SPARKY_FITNESS_FORCE_EMAIL_LOGIN: false
              SPARKY_FITNESS_DISABLE_EMAIL_LOGIN: false
              SPARKY_FITNESS_DISABLE_SIGNUP: false
              SPARKY_FITNESS_OIDC_AUTO_REDIRECT: false
              SPARKY_FITNESS_OIDC_AUTO_REGISTER: false

              ALLOW_PRIVATE_NETWORK_CORS: false
              SPARKY_FITNESS_EXTRA_TRUSTED_ORIGINS: ""

              GARMIN_MICROSERVICE_URL: http://sparkyfitness-garmin:8000

            envFrom:
              - secretRef:
                  name: sparkyfitness-secrets

            resources:
              requests:
                cpu: 15m
                memory: 256M
              limits:
                memory: 1Gi

    service:
      app:
        controller: sparkyfitness-server
        ports:
          http:
            port: 3010

    persistence:
      config:
        enabled: true
        existingClaim: sparkyfitness-server
        globalMounts:
          - path: /uploads