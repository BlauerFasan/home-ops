---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app echo
spec:
  targetNamespace: database
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  path: ./kubernetes/apps/default/echo/app
  components:
    - ../../../../components/gatus/external
  dependsOn: []
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  prune: true
  interval: 1h
  targetNamespace: default
  wait:
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
    substitute:
      APP: *app
      GATUS_SUBDOMAIN: *app
