---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vaultwarden
  annotations:
    hajimari.io/enable: "true"
    hajimari.io/icon: shield-lock-outline
    hajimari.io/group: home
    hajimari.io/appName: kinko
spec:
  hostnames:
    - "angou.${SECRET_DOMAIN}"
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: vaultwarden
          port: 80
