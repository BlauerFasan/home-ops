---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app authentik
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: authentik

  install:
    createNamespace: false
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5

  values:
    global:
      # fullnameOverride: authentik
      deploymentAnnotations:
        reloader.stakater.com/auto: "true"

      deploymentStrategy:
        type: RollingUpdate

      envFrom:
        - secretRef:
            name: authentik-secret

    geoip:
      # -- enable GeoIP sidecars for the authentik server and worker pods
      enabled: false

    server:
      replicas: 1

      initContainers:
        - name: init-db
          image: ghcr.io/home-operations/postgres-init:18.3@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
          envFrom:
            - secretRef:
                  name: authentik-init-db

      metrics:
        enabled: true
        serviceMonitor:
          enabled: true

      resources:
        requests:
          cpu: 50m
          memory: 500Mi
        limits:
          memory: 800Mi

    authentik:
      log_level: info
      email:
        use_tls: false
      outposts:
        container_image_base: ghcr.io/goauthentik/%(type)s:%(version)s
      error_reporting:
        enabled: false
        send_pii: false

    postgresql:
      enabled: false
    redis:
      enabled: false
    prometheus:
      rules:
        enabled: true

    worker:
      name: worker
      replicas: 1

      resources:
        requests:
          cpu: 50m
          memory: 500Mi
        limits:
          memory: 1200Mi

