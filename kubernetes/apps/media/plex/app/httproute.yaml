---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: plex
  annotations:
    hajimari.io/enable: "true"
    hajimari.io/appName: "plex"
    hajimari.io/group: home
    hajimari.io/icon: "mdi:plex"
spec:
  hostnames:
    - "plex.${SECRET_DOMAIN}"
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: plex
          port: 32400
