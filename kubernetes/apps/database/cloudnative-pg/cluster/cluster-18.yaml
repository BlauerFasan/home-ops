---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: home-ops18
spec:
  instances: 3 # set to the number of nodes in the cluster

  # renovate: datasource=docker depName=ghcr.io/cloudnative-pg/postgresql
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3@sha256:16aa41fdc7df47e7bc45d882227323048a4ea21e3cf384b44e20608e900d3449
  primaryUpdateStrategy: unsupervised

  storage:
    size: 20Gi
    storageClass: openebs-hostpath

  superuserSecret:
    name: postgres-superuser

  enableSuperuserAccess: true

  resources:
    requests:
      cpu: 500m
    limits:
      memory: 4Gi

  postgresql:
    parameters:
      max_connections: "600"
      max_slot_wal_keep_size: 20GB
      shared_buffers: 512MB
      timezone: ${CLUSTER_TIMEZONE}

  monitoring:
    enablePodMonitor: true

  backup:
    volumeSnapshot:
      className: csi-ceph-blockpool
      snapshotOwnerReference: cluster

  plugins:
    - enabled: true
      isWALArchiver: true
      name: barman-cloud.cloudnative-pg.io
      parameters: &barmanParameters
        barmanObjectName: garage-home-ops
        serverName: home-ops18-v1

  bootstrap:
    initdb:
      database: app
      encoding: UTF8
      localeCType: C
      localeCollate: C
      owner: app

  externalClusters:
    - name: source
      plugin:
        enabled: true
        isWALArchiver: false
        name: barman-cloud.cloudnative-pg.io
        parameters: *barmanParameters