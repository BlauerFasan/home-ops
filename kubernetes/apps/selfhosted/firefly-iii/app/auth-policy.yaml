---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: firefly-iii-auth
  namespace: selfhosted
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: firefly-iii
  extAuth:
    headersToExtAuth:
      - cookie
    http:
      backendRefs:
        - group: ""
          kind: Service
          name: ak-outpost-authentik-embedded-outpost
          namespace: security
          port: 9000
      path: /outpost.goauthentik.io/auth/envoy
