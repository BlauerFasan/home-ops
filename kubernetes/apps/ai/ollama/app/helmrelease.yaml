---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ollama
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: ollama

  maxHistory: 5
  install:
    remediation:
      retries: 5
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
  uninstall:
    keepHistory: false

  values:
    controllers:
      ollama:
        annotations:
          reloader.stakater.com/auto: "true"

        pod:
          runtimeClassName: nvidia
          nodeSelector:
            nvidia.feature.node.kubernetes.io/gpu: "true"

        containers:
          app:
            image:
              repository: ollama/ollama
              tag: 0.20.6@sha256:d5034f60974be528e0a5523ba5e89156e4a9ffd12d0b2b18475fb148237f3d4c

            env:
              TZ: ${CLUSTER_TIMEZONE}
              OLLAMA_HOST: 0.0.0.0
              OLLAMA_ORIGINS: "*"
              OLLAMA_LOG_LEVEL: info
              OLLAMA_MODELS: &pvc /models
              OLLAMA_LOAD_TIMEOUT: 10m

              OLLAMA_FLASH_ATTENTION: 1
              OLLAMA_CONTEXT_LENGTH: 9216
              OLLAMA_NUM_PARALLEL: 1
              OLLAMA_MAX_LOADED_MODELS: "2"

            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 11434
              readiness: *probes

            resources:
              requests:
                nvidia.com/gpu: 1
              limits:
                nvidia.com/gpu: 1

            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true

    service:
      ollama:
        ports:
          http:
            port: 11434

    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /root/.ollama
      models:
        existingClaim: ollama-models-pvc
        globalMounts:
          - path: /models
      run:
        type: emptyDir
        medium: Memory
        sizeLimit: 128Mi
      tmp:
        type: emptyDir
        medium: Memory
        sizeLimit: 128Mi


